query Input {
  cart {
    lines {
      id
      quantity
      merchandise {
        ... on ProductVariant {
          id
        }
      }
      bundleId:   attribute(key: "_bundleId")    { value }
      bundleName: attribute(key: "_bundleName")  { value }
      components: attribute(key: "_components")  { value }
    }
  }
}